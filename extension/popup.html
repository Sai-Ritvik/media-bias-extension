<!DOCTYPE html>
<html>
<head>
  <title>AllSides</title>
  <style>
    body {
      width: 420px;
      min-height: 200px;
      font-family: Arial, sans-serif;
      padding: 12px 16px;
      margin: 0;
      font-size: 13px;
    }
    h2 { margin: 0 0 10px; font-size: 16px; }
    h3 { margin: 10px 0 4px; font-size: 13px; color: #444; }
    button {
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #1558b0; }
    #result { margin-top: 12px; }
    .article-card {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .article-card b { display: block; margin-bottom: 2px; }
    .article-card a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 12px;
    }
    .article-card a:hover { text-decoration: underline; }
    .bias-box {
      background: #f1f3f4;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .bias-label {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .bias-left   { color: #1565c0; }
    .bias-right  { color: #b71c1c; }
    .bias-center { color: #2e7d32; }
    .keywords {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    #loading { color: #888; font-style: italic; }

    .loader-wrap {
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 0 16px;
      gap: 14px;
    }
    .loader-wrap span {
      font-size: 12px;
      color: #888;
      font-style: italic;
    }
    .spinner {
      width: 40px;
      height: 40px;
      position: relative;
    }
    .spinner::before,
    .spinner::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      border: 3px solid transparent;
    }
    .spinner::before {
      inset: 0;
      border-top-color: #1a73e8;
      animation: spin 0.9s linear infinite;
    }
    .spinner::after {
      inset: 6px;
      border-top-color: #a8c7fa;
      animation: spin 0.7s linear infinite reverse;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    .dots span {
      display: inline-block;
      width: 7px;
      height: 7px;
      margin: 0 3px;
      border-radius: 50%;
      background: #1a73e8;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .dots span:nth-child(2) { animation-delay: 0.2s; background: #4285f4; }
    .dots span:nth-child(3) { animation-delay: 0.4s; background: #a8c7fa; }
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0.6); opacity: 0.5; }
      40%            { transform: scale(1.1); opacity: 1; }
    }
  </style>
</head>
<body>
  <h2>News Comparator</h2>
  <button id="btn">Get News</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
