<!DOCTYPE html>
<html>
<head>
  <title>AllSides</title>
  <style>
    body {
      width: 420px;
      min-height: 200px;
      font-family: Arial, sans-serif;
      padding: 12px 16px;
      margin: 0;
      font-size: 13px;
    }
    h2 { margin: 0 0 10px; font-size: 16px; }
    h3 { margin: 10px 0 4px; font-size: 13px; color: #444; }
    button {
      padding: 7px 14px;
      cursor: pointer;
      font-size: 13px;
      background: #1a73e8;
      color: white;
      border: none;
      border-radius: 4px;
    }
    button:hover { background: #1558b0; }
    #result { margin-top: 12px; }
    .article-card {
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 8px 10px;
      margin-bottom: 8px;
    }
    .article-card b { display: block; margin-bottom: 2px; }
    .article-card a {
      color: #1a73e8;
      text-decoration: none;
      font-size: 12px;
    }
    .article-card a:hover { text-decoration: underline; }
    .bias-box {
      background: #f1f3f4;
      border-radius: 6px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }
    .bias-label {
      font-weight: bold;
      font-size: 14px;
      margin-bottom: 4px;
    }
    .bias-left   { color: #1565c0; }
    .bias-right  { color: #b71c1c; }
    .bias-center { color: #2e7d32; }
    .keywords {
      font-size: 11px;
      color: #666;
      margin-top: 4px;
    }
    #loading { color: #888; font-style: italic; }
  </style>
</head>
<body>
  <h2>News Comparator</h2>
  <button id="btn">Get News</button>
  <div id="result"></div>
  <script src="popup.js"></script>
</body>
</html>
